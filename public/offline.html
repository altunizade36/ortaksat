<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0EA5B7" />
    <title>Çevrimdışısın — OrtakSat</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #F4F6F8; color: #0F172A;
        display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      .card {
        background: #fff; border: 1px solid #E5E9EE; border-radius: 20px;
        max-width: 380px; width: 100%; padding: 32px 26px; text-align: center;
        box-shadow: 0 12px 40px rgba(16,24,40,0.08);
      }
      .ring {
        width: 72px; height: 72px; border-radius: 999px; margin: 0 auto 18px;
        background: #E1F3EE; display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 20px; font-weight: 900; margin: 0 0 8px; }
      p { color: #64748B; font-size: 14px; line-height: 21px; margin: 0 0 22px; font-weight: 500; }
      button {
        background: #0EA5B7; color: #fff; border: 0; border-radius: 12px;
        font-size: 14px; font-weight: 800; padding: 13px 22px; width: 100%;
        cursor: pointer; font-family: inherit;
      }
      button:active { opacity: .85; }
      .brand { margin-top: 16px; color: #94A3B8; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }
      .brand img { width: 18px; height: 18px; display: block; }
      @media (prefers-color-scheme: dark) {
        body { background: #0B1220; color: #E5E9EE; }
        .card { background: #131C2B; border-color: #24303F; }
        p { color: #94A3B8; }
        .ring { background: #10362C; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ring">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#0EA5B7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><path d="M12 20h.01" />
        </svg>
      </div>
      <h1>Çevrimdışısın</h1>
      <p>İnternet bağlantın kesildi. Bağlantı geri geldiğinde OrtakSat'a kaldığın yerden devam edebilirsin.</p>
      <button onclick="location.reload()">Yeniden dene</button>
      <div class="brand"><img src="/logo-mark.png" width="18" height="18" alt="" />OrtakSat · Ortak satışla kazan</div>
    </div>
    <script>
      window.addEventListener('online', function () { location.reload(); });
    </script>
  </body>
</html>
